<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何宜璟的自我介紹</title>
    <style>
        /* 基礎設定 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            background: black;
            overflow-x: hidden;
        }

        /* Matrix 背景畫布 */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 區塊通用樣式 */
        header, section, footer {
            background-color: rgba(0, 0, 0, 0.8); 
            padding: 1.5rem 2rem;
            border-radius: 10px;
            max-width: 800px;
            margin: 1rem auto;
            border: 1px solid #00ff41;
            color: #00ff41;
        }

        header { text-align: center; }

        /* 導覽列 */
        nav {
            background-color: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff41;
            border-radius: 10px;
            max-width: 800px;
            margin: auto;
        }
        nav ul { 
            display: flex; 
            justify-content: center; 
            list-style: none; /* 移除導覽列點點 */
        }
        nav ul li { margin: 0 1rem; }
        nav ul li a { 
            color: #00ff41; 
            text-decoration: none; 
            padding: 0.5rem; 
            transition: 0.3s; 
        }
        nav ul li a:hover { 
            background-color: #00ff41; 
            color: black; 
            border-radius: 5px; 
        }

        /* 內容區清單樣式：移除點點並對齊 */
        section ul {
            list-style: none; 
            padding: 0;
        }
        section ul li {
            margin-bottom: 0.5rem;
        }

        section h2 { 
            margin-bottom: 1rem; 
            color: #00ff41; 
            text-shadow: 0 0 5px #00ff41; 
        }

        .highlight { color: #ff3e3e; font-weight: bold; }
        
        a { color: #00ff41; }
    </style>
</head>
<body>
    
    <canvas id="matrix"></canvas>

    <header>
        <h1>大家好，我是何宜璟</h1>
        <p>程式設計愛好者</p>
    </header>

    <nav>
        <ul>
            <li><a href="#about">關於我</a></li>
            <li><a href="#skills">技能</a></li>
            <li><a href="#projects">作品集</a></li>
            <li><a href="#contact">聯絡我</a></li>
        </ul>
    </nav>

    <section id="about">

        <p>我今年14歲，平時喜歡刷程式題目、挑戰新的專案。</p>
    </section>

    <section id="skills">
        <h2>技能</h2>
        <ul>
            <li>Python <span class="highlight">(ITS py918)</span></li>
            <li>C++</li>
            <li>HTML / CSS</li>
            <li>JavaScript <span class="highlight">(ITS js1000)</span></li>
        </ul>
    </section>

    <section id="projects">
        <h2>作品集</h2>
        <ul>
            <li>各種程式刷題成果（ZeroJudge / CSES）</li>
            <li>現在這個網站</li>
            <li><a href="https://2026-4-19.vercel.app/" target="_blank">井字遊戲</a></li>

    <section id="contact">

    </section>

    <footer>
        <p>&copy; 2026 何宜璟</p>
    </footer>

    <script>
        // Matrix 數位雨動畫特效
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            // 建立漸層淡出效果
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // 隨機回到頂部
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        // 視窗大小縮放時重新調整畫布
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight;
            // 重新計算列數以防破圖
            const newColumns = canvas.width / fontSize;
            while(drops.length < newColumns) drops.push(1);
        });
    </script>
</body>
</html>
